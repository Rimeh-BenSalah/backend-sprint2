<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />

<head>
	<meta charset="utf-8">
	<title>Ajout des Livres</title>
</head>

<body>

	<div th:replace="template"></div>

	<div class="container mt-5">
		<div class="card">

			<div class="card-header"> Ajout des Livres </div>

			<div class="card-body">

				<form th:action="@{saveLivre}" method="post">

				    <div class="form-group">
				        <label class="control-label">Nom Livre :</label>
				        <input type="text" name="nomLivre" class="form-control" />
				        <span th:errors="${livre.nomLivre}" class="text-danger"></span>
				    </div>

				    <div class="form-group">
				        <label class="control-label">Auteur :</label>
				        <input type="text" name="auteur" class="form-control" />
				        <span th:errors="${livre.auteur}" class="text-danger"></span>
				    </div>

				    <div class="form-group">
				        <label class="control-label">Prix Livre :</label>
				        <input type="text" name="prixLivre" class="form-control" />
				        <span th:errors="${livre.prixLivre}" class="text-danger"></span>
				    </div>

				    <div class="form-group">
				        <label class="control-label">Date de publication :</label>
				        <input type="date" name="Datedepublication" class="form-control" />
				        <span th:errors="${livre.Datedepublication}" class="text-danger"></span>
				    </div>

				    <div class="form-group">
				        <label class="control-label">Email :</label>
				        <input type="email" name="email" class="form-control" />
				        <span th:errors="${livre.email}" class="text-danger"></span>
				    </div>

				    <div>
				        <button type="submit" class="btn btn-primary">Ajouter</button>
				    </div>

				</form>

			</div>
		</div>
	</div>

</body>

</html>
